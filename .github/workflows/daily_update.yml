name: Daily Data Update

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00 = 台灣早上 10:00
  workflow_dispatch:      # 允許手動按鈕觸發

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 執行 Wiki 更新：寫入 Supabase wiki_metric
      - name: Run Wiki Supabase Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python app_wiki.py

      # 執行 YouTube 更新：寫入 Supabase youtube_metric
      - name: Run YouTube Supabase Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python app_yt.py 1